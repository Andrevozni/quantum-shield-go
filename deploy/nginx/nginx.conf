# Nginx load balancer for 3-node QuantumShield cluster.
# Proxies HTTP to the Raft cluster; the leader handles writes,
# all nodes handle reads. Nginx round-robins here for simplicity;
# production deployments should add active health checks.

events {
    worker_connections 1024;
}

http {
    upstream quantum_shield {
        # Round-robin across all three nodes.
        # Add 'least_conn;' directive for connection-count balancing.
        server qs-node1:8080;
        server qs-node2:8080;
        server qs-node3:8080;

        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Forward all traffic to the cluster.
        location / {
            proxy_pass         http://quantum_shield;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — match server WriteTimeout (60s).
            proxy_connect_timeout  5s;
            proxy_read_timeout     65s;
            proxy_send_timeout     65s;
        }

        # Health check endpoint served directly by Nginx.
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # Uncomment for HTTPS termination at Nginx:
    # server {
    #     listen 443 ssl;
    #     ssl_certificate     /etc/nginx/tls/tls.crt;
    #     ssl_certificate_key /etc/nginx/tls/tls.key;
    #     ssl_protocols       TLSv1.3;
    #     ...
    # }
}
