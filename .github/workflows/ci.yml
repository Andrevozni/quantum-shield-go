name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

# Cancel in-progress runs for the same branch on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast check: vet + short tests (no Argon2id / SLH-DSA keygen) ────────────
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.24", "1.25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify module graph
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...

      - name: Unit tests (short, race detector)
        run: |
          go test -short -race -count=1 -timeout=120s \
            -coverprofile=coverage.out -covermode=atomic \
            ./...

      - name: Upload coverage report
        if: matrix.go == '1.24'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ── Slow tests: Argon2id, SLH-DSA keygen, full integration suite ────────────
  test-slow:
    name: Slow tests (integration + crypto)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Full test suite (no -short, race detector)
        run: |
          go test -race -count=1 -timeout=300s \
            $(go list ./... | grep -v 'internal/vault')

      - name: Vault tests (timing — no race, deterministic)
        run: go test -count=3 -timeout=60s ./internal/vault/...

  # ── Static analysis ──────────────────────────────────────────────────────────
  lint:
    name: Static analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # ── Security scanning ────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck — dependency CVE scan
        run: govulncheck ./...

      - name: Migration scanner self-check
        run: go run ./cmd/scanner -strict . || true

  # ── Crypto benchmarks ────────────────────────────────────────────────────────
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run benchmarks
        run: |
          go test -run=^$ -bench=Benchmark -benchtime=3s -benchmem \
            ./internal/kem/... \
            ./internal/dsa/... \
            ./internal/hybrid/... \
            ./internal/slhdsa/... \
            ./internal/ca/... \
            ./internal/hsm/... \
            ./internal/kdf/... \
            ./internal/audit/... \
            ./internal/channel/... \
            ./internal/threshold/... \
            ./internal/vault/... \
            ./pkg/metrics/... \
            2>&1 | tee benchmark.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.txt
          retention-days: 30

  # ── Docker: build, scan, smoke-test ─────────────────────────────────────────
  docker:
    name: Docker build + scan + smoke
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write   # for Trivy SARIF upload

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t quantum-shield:ci .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: quantum-shield:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"          # annotate but don't fail CI on findings

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Smoke test — live + ready endpoints
        run: |
          docker run -d --name qs-smoke -p 18080:8080 quantum-shield:ci
          # Wait up to 10 s for the server to accept connections.
          for i in $(seq 1 10); do
            curl -sf http://localhost:18080/health/live && break
            sleep 1
          done
          curl -sf http://localhost:18080/health/live
          curl -sf http://localhost:18080/health/ready
          docker stop qs-smoke
          docker rm qs-smoke

      - name: Smoke test — TLS self-signed
        run: |
          # Generate a throwaway self-signed cert for the TLS smoke test.
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 \
            -keyout /tmp/tls.key -out /tmp/tls.crt \
            -days 1 -nodes -subj "/CN=localhost"
          docker run -d --name qs-tls \
            -p 18443:8443 \
            -e LISTEN_ADDR=:8443 \
            -e TLS_CERT_FILE=/tls/tls.crt \
            -e TLS_KEY_FILE=/tls/tls.key \
            -v /tmp:/tls:ro \
            quantum-shield:ci
          for i in $(seq 1 10); do
            curl -sf -k https://localhost:18443/health/live && break
            sleep 1
          done
          curl -sf -k https://localhost:18443/health/live
          docker stop qs-tls
          docker rm qs-tls
