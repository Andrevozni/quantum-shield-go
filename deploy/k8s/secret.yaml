# QuantumShield secrets.
# In production use External Secrets Operator or Vault Agent Injector
# instead of storing secrets in this file.
#
# Generate values:
#   echo -n "$(openssl rand -hex 32)" | base64
#
# Apply:
#   kubectl apply -f secret.yaml -n quantum-shield
apiVersion: v1
kind: Secret
metadata:
  name: quantum-shield-secrets
  namespace: quantum-shield
  labels:
    app.kubernetes.io/name: quantum-shield
type: Opaque
stringData:
  # POST /auth/token bootstrap secret (change before deploying)
  bootstrap-secret: "change-me-in-production"

  # Keystore encryption password
  keystore-password: "change-me-in-production"

  # CA store encryption password
  ca-store-password: "change-me-in-production"
