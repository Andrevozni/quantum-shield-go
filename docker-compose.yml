# QuantumShield — docker compose
#
# Profiles:
#   (default)    single node, plain HTTP, dev
#   cluster      3-node Raft HA cluster
#   tls          single node with TLS (mount certs first)
#   monitoring   adds Prometheus + Grafana
#
# Quick start (dev):
#   docker compose up
#
# 3-node cluster (dev, plain HTTP):
#   docker compose --profile cluster up
#
# With monitoring:
#   docker compose --profile cluster --profile monitoring up

x-qs-common: &qs-common
  build:
    context: .
    dockerfile: Dockerfile
  image: quantum-shield:latest
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp

# ── Secrets (Docker Secrets — use instead of plain env vars in production) ────
# secrets:
#   bootstrap_secret:
#     file: ./secrets/bootstrap_secret.txt
#   keystore_password:
#     file: ./secrets/keystore_password.txt
#   ca_store_password:
#     file: ./secrets/ca_store_password.txt

services:

  # ── Single-node dev server (default profile) ─────────────────────────────────
  api:
    <<: *qs-common
    container_name: qs-api
    ports:
      - "8080:8080"   # HTTP (dev)
      - "8443:8443"   # HTTPS (enable via TLS_AUTO_SELF_SIGNED or cert files)
    environment:
      LISTEN_ADDR:          ":8080"
      LOG_LEVEL:            "INFO"
      ALLOWED_ORIGINS:      ""
      BOOTSTRAP_SECRET:     "change-me-in-production"
      TLS_AUTO_SELF_SIGNED: "false"   # set "true" for instant HTTPS in dev
      TLS_MIN_VERSION:      "1.3"
      REVOCATION_FILE:      "/data/revocation.json"
      KEYSTORE_PATH:        "/data/keystore.qsk"
      KEYSTORE_PASSWORD:    "change-me-in-production"
      CA_STORE_PATH:        "/data/ca.qsc"
      CA_STORE_PASSWORD:    "change-me-in-production"
    volumes:
      - qs_data_single:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── 3-node Raft cluster ───────────────────────────────────────────────────────
  # Each node: HTTP API on 808{1,2,3}, Raft on 700{1,2,3}
  # Nodes discover each other via Docker internal DNS (service name).
  qs-node1:
    <<: *qs-common
    container_name: qs-node1
    profiles: [cluster]
    ports:
      - "8081:8080"
      - "7001:7000"
    environment:
      LISTEN_ADDR:          ":8080"
      LOG_LEVEL:            "INFO"
      BOOTSTRAP_SECRET:     "change-me-in-production"
      REVOCATION_FILE:      "/data/revocation.json"
      KEYSTORE_PATH:        "/data/keystore.qsk"
      KEYSTORE_PASSWORD:    "change-me-in-production"
      CA_STORE_PATH:        "/data/ca.qsc"
      CA_STORE_PASSWORD:    "change-me-in-production"
      # Raft cluster config
      QS_CLUSTER_ENABLED:   "true"
      QS_CLUSTER_NODE_ID:   "node-1"
      QS_CLUSTER_BIND_ADDR: "qs-node1:7000"
      QS_CLUSTER_BOOTSTRAP: "true"
      QS_CLUSTER_DATA_DIR:  "/data/raft"
      QS_CLUSTER_JOIN_ADDR: ""
    volumes:
      - qs_node1_data:/data
    networks:
      - qs-cluster
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  qs-node2:
    <<: *qs-common
    container_name: qs-node2
    profiles: [cluster]
    ports:
      - "8082:8080"
      - "7002:7000"
    environment:
      LISTEN_ADDR:          ":8080"
      LOG_LEVEL:            "INFO"
      BOOTSTRAP_SECRET:     "change-me-in-production"
      REVOCATION_FILE:      "/data/revocation.json"
      KEYSTORE_PATH:        "/data/keystore.qsk"
      KEYSTORE_PASSWORD:    "change-me-in-production"
      CA_STORE_PATH:        "/data/ca.qsc"
      CA_STORE_PASSWORD:    "change-me-in-production"
      QS_CLUSTER_ENABLED:   "true"
      QS_CLUSTER_NODE_ID:   "node-2"
      QS_CLUSTER_BIND_ADDR: "qs-node2:7000"
      QS_CLUSTER_BOOTSTRAP: "false"
      QS_CLUSTER_DATA_DIR:  "/data/raft"
      QS_CLUSTER_JOIN_ADDR: "qs-node1:7000"
    volumes:
      - qs_node2_data:/data
    networks:
      - qs-cluster
    depends_on:
      qs-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  qs-node3:
    <<: *qs-common
    container_name: qs-node3
    profiles: [cluster]
    ports:
      - "8083:8080"
      - "7003:7000"
    environment:
      LISTEN_ADDR:          ":8080"
      LOG_LEVEL:            "INFO"
      BOOTSTRAP_SECRET:     "change-me-in-production"
      REVOCATION_FILE:      "/data/revocation.json"
      KEYSTORE_PATH:        "/data/keystore.qsk"
      KEYSTORE_PASSWORD:    "change-me-in-production"
      CA_STORE_PATH:        "/data/ca.qsc"
      CA_STORE_PASSWORD:    "change-me-in-production"
      QS_CLUSTER_ENABLED:   "true"
      QS_CLUSTER_NODE_ID:   "node-3"
      QS_CLUSTER_BIND_ADDR: "qs-node3:7000"
      QS_CLUSTER_BOOTSTRAP: "false"
      QS_CLUSTER_DATA_DIR:  "/data/raft"
      QS_CLUSTER_JOIN_ADDR: "qs-node1:7000"
    volumes:
      - qs_node3_data:/data
    networks:
      - qs-cluster
    depends_on:
      qs-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Nginx load balancer (cluster profile) ────────────────────────────────────
  qs-lb:
    image: nginx:alpine
    container_name: qs-lb
    profiles: [cluster]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount TLS certs here for HTTPS:
      # - ./tls/tls.crt:/etc/nginx/tls/tls.crt:ro
      # - ./tls/tls.key:/etc/nginx/tls/tls.key:ro
    networks:
      - qs-cluster
    depends_on:
      - qs-node1
      - qs-node2
      - qs-node3

  # ── Monitoring (optional --profile monitoring) ────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: qs-prometheus
    restart: unless-stopped
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - qs-cluster

  grafana:
    image: grafana/grafana-oss:latest
    container_name: qs-grafana
    restart: unless-stopped
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - qs-cluster
    depends_on:
      - prometheus

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  qs-cluster:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  qs_data_single:
  qs_node1_data:
  qs_node2_data:
  qs_node3_data:
  prometheus_data:
  grafana_data:
